services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tinyevents-package-smoke-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TinyEvents_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14334:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TinyEvents_2026! -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
