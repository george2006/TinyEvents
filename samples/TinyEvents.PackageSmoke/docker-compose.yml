services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tinyevents-package-smoke-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TinyEvents_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14334:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TinyEvents_2026! -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgresql:
    image: postgres:16-alpine
    container_name: tinyevents-package-smoke-postgresql
    environment:
      POSTGRES_DB: "tinyevents_package_smoke"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "54324:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tinyevents_package_smoke"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
